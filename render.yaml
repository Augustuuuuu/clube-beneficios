services:
  - type: web
    name: clube-beneficios-web
    env: python
    plan: free
    # O buildCommand foi atualizado para instalar, preparar estáticos, migrar o banco e criar o admin
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python create_admin.py"
    startCommand: "gunicorn clube.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: clube.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: clube-beneficios-db
          property: connectionString

databases:
  - name: clube-beneficios-db
    plan: free